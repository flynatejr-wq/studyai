name: Deploy Server to Railway

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - "railway.toml"
      - "nixpacks.toml"
      - ".github/workflows/deploy-server.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirm push received (Railway deploys via native GitHub integration)
        run: |
          echo "✅ Push to master received — Railway's GitHub integration will"
          echo "   pick up this commit and build automatically."
          echo "   Commit: ${{ github.sha }}"
          echo "   Ref:    ${{ github.ref }}"
