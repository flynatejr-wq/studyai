<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!--
      ANTI-FLASH THEME SCRIPT
      Runs synchronously before any paint so the correct light/dark class is
      on <html> before CSS is applied — zero flash of wrong theme on load.
      Must stay as an inline <script>, NOT deferred or async.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('sb_theme');
          if (t !== 'light' && t !== 'dark') {
            t = 'dark'; // StudyBuddi defaults to dark mode for all new visitors
          }
          document.documentElement.classList.add(t);
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = t === 'light' ? '#f0f4fe' : '#0a0a12';
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <title>StudyBuddi &#8211; AI-Powered Study Guides</title>
    <meta name="description" content="Turn any lecture into a perfect study guide. Upload audio, snap a photo, or paste notes &#8211; get summaries, flashcards, quizzes, and an AI tutor instantly." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StudyBuddi" />

    <!-- Icons -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="StudyBuddi &#8211; AI-Powered Study Guides" />
    <meta property="og:description" content="Turn any lecture into a perfect study guide. Upload audio, snap a photo, or paste notes &#8211; get summaries, flashcards, quizzes, and an AI tutor instantly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studybuddi.vercel.app/" />
    <meta property="og:image" content="https://studybuddi.vercel.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="StudyBuddi" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StudyBuddi &#8211; AI-Powered Study Guides" />
    <meta name="twitter:description" content="Turn any lecture into a perfect study guide with AI." />
    <meta name="twitter:image" content="https://studybuddi.vercel.app/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
