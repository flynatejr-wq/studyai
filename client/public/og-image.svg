<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb -->
  <ellipse cx="600" cy="315" rx="380" ry="220" fill="rgba(99,102,241,0.08)"/>

  <!-- Logo mark -->
  <rect x="516" y="145" width="64" height="64" rx="16" fill="url(#purple)"/>
  <rect x="528" y="157" width="18" height="40" rx="3" fill="rgba(255,255,255,0.95)"/>
  <rect x="554" y="157" width="18" height="40" rx="3" fill="rgba(255,255,255,0.6)"/>

  <!-- Brand name -->
  <text x="600" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="800" text-anchor="middle" fill="url(#text-grad)">StudyBuddi</text>

  <!-- Tagline -->
  <text x="600" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" font-weight="400" text-anchor="middle" fill="rgba(148,163,184,0.9)">Turn any lecture into a complete study system</text>

  <!-- Feature pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="218" y="370" width="190" height="44" rx="22" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
    <text x="313" y="398" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#818cf8">✦ Summaries</text>

    <!-- Pill 2 -->
    <rect x="430" y="370" width="190" height="44" rx="22" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
    <text x="525" y="398" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#a78bfa">✦ Flashcards</text>

    <!-- Pill 3 -->
    <rect x="642" y="370" width="150" height="44" rx="22" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
    <text x="717" y="398" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#818cf8">✦ Quizzes</text>

    <!-- Pill 4 -->
    <rect x="814" y="370" width="168" height="44" rx="22" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
    <text x="898" y="398" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#a78bfa">✦ AI Tutor</text>
  </g>

  <!-- Bottom domain -->
  <text x="600" y="535" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="500" text-anchor="middle" fill="rgba(100,116,139,0.7)">studybuddi.vercel.app</text>
</svg>
